# Dokploy: Docker Compose. PostgreSQL en `dokploy-network`.
# Variables en .env de Dokploy:
#   DB_CONNECTION=pgsql
#   DB_HOST=<servicio-postgres>
#   APP_URL=https://tu-dominio

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  target: production

x-app-common: &app-common
  image: prueba-hoteles:latest
  pull_policy: never
  env_file:
    - .env

x-app-volumes: &app-volumes
  - storage-data:/var/www/html/storage/app
  - storage-logs:/var/www/html/storage/logs

services:
  app:
    build: *app-build
    <<: *app-common
    restart: always
    expose:
      - "8080"
    volumes: *app-volumes
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/up || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

networks:
  dokploy-network:
    external: true

volumes:
  storage-data:
  storage-logs:
